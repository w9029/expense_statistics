app_name: "expense-statistics-server"
env: "development"
server_port: "8080"
jwt_secret: "my_super_secret"

db:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "your_db_password_here"
  name: "expense_statistics_proj"
  sslmode: "disable"
  timezone: "Asia/Tokyo"

mail:
  from: "your email"
  host: "smtp server"
  port: 465
  username: "your email"
  password: "your email_password_here"

exchange:
  api_key: "your_currencyapi_key_here"
  historical_url: "https://api.currencyapi.com/v3/historical"
  latest_url: "https://api.currencyapi.com/v3/latest"
  request_timeout_seconds: 15
  rate_window_days: 2  # Number of days to look back for exchange rate data when calculating statistics
  backfill_lookback_days: 90   # Number of days to look back when backfilling exchange rate data for existing expenses
  scheduler:
    enabled: true
    timezone: "Asia/Tokyo"
    daily_run_at: "00:00"
    base_currency: "JPY"
    target_currencies: ["CNY", "USD"]
    startup_sync: true
